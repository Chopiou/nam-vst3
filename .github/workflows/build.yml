name: Build VST3 Plugin

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fetch VST3 SDK (Steinberg)
        run: |
          git clone --depth 1 --branch 3.7 https://github.com/steinbergmedia/vst3sdk.git "${{ runner.temp }}/vst3sdk"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libeigen3-dev libx11-dev libxext-dev libxrender-dev libxrandr-dev libxi-dev
      - name: Build Linux VST3
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DVST3_SDK_PATH="${{ runner.temp }}/vst3sdk"
          cmake --build . --config Release -j$(nproc)
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NAMLoader-linux.vst3
          path: build/NAMLoader.vst3
          retention-days: 30

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fetch VST3 SDK (Steinberg)
        run: |
          git clone --depth 1 --branch 3.7 https://github.com/steinbergmedia/vst3sdk.git "${{ runner.temp }}/vst3sdk"
      - name: Install dependencies
        run: |
          brew install cmake eigen
      - name: Build macOS VST3 (Universal)
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DVST3_SDK_PATH="${{ runner.temp }}/vst3sdk"
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      - name: Ad-hoc codesign (no Apple ID required)
        run: |
          codesign --force --deep --sign - --timestamp=none build/NAMLoader.vst3
      - name: Package macOS universal tar.gz (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar -czf "Namloader-v${VERSION}-macos-universal.vst3.tar.gz" -C build NAMLoader.vst3
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NAMLoader-macos.vst3
          path: build/NAMLoader.vst3
          retention-days: 30
      - name: Upload macOS tar.gz for release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Namloader-macos-universal.tar.gz
          path: "Namloader-v${{ github.ref_name }}.tar.gz"
          retention-days: 30

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          choco install cmake eigen --version=3.4.0
      - name: Build Windows VST3
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..
          cmake --build . --config Release -j
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NAMLoader-windows.vst3
          path: build/Release/NAMLoader.vst3
          retention-days: 30

  release:
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/NAMLoader-linux.vst3/NAMLoader.vst3
            artifacts/Namloader-macos-universal.tar.gz/Namloader-v${{ github.ref_name }}.tar.gz
            artifacts/NAMLoader-windows.vst3/NAMLoader.vst3
          generate_release_notes: true

      - name: Update Homebrew tap SHA256
        id: update_sha256
        if: success()
        run: |
          VERSION=${{ github.ref_name }}
          TARBALL="Namloader-v${VERSION}.tar.gz"
          TARBALL_PATH=$(find artifacts -name "$TARBALL" | head -1)
          if [ -z "$TARBALL_PATH" ] || [ ! -f "$TARBALL_PATH" ]; then
            echo "Tarball not found: $TARBALL" >&2
            exit 1
          fi
          SHA256=$(sha256sum "$TARBALL_PATH" | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Tarball: $TARBALL"
          echo "SHA256: $SHA256"

      - name: Commit SHA256 to homebrew tap
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: Chopiou/homebrew-namloader
          branch: update-sha256-${{ github.ref_name }}
          base: main
          commit-message: "Update SHA256 for Namloader ${{ github.ref_name }}"
          title: "Update SHA256 for Namloader ${{ github.ref_name }}"
          body: |
            Auto-update SHA256 for [Namloader ${{ github.ref_name }}](https://github.com/Chopiou/nam-vst3/releases/tag/${{ github.ref_name }})
            
            - Tarball: `Namloader-v${{ github.ref_name }}.tar.gz`
            - SHA256: `${{ steps.update_sha256.outputs.SHA256 }}`
          files: |
            Formula/namloader.rb
          path-modification: |
            sed -i 's/sha256 "PLACEHOLDER_UPDATED_BY_CI"/sha256 "${{ steps.update_sha256.outputs.SHA256 }}"/' Formula/namloader.rb
            sed -i 's/version "0.1.0"/version "${{ github.ref_name }}"/' Formula/namloader.rb