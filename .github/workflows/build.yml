name: Build VST3 Plugin

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libeigen3-dev libx11-dev libxext-dev libxrender-dev libxrandr-dev libxi-dev
      - name: Build Linux VST3
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j$(nproc)
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: NAMLoader-linux.vst3
          path: build/NAMLoader.vst3
          retention-days: 30

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          brew install cmake eigen
      - name: Build macOS VST3 (Universal)
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      - name: Codesign (requires Apple Developer ID)
        if: env.APPLE_DEVELOPER_ID != ''
        run: |
          codesign --force --deep --sign "${{ env.APPLE_DEVELOPER_ID }}" build/NAMLoader.vst3
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NAMLoader-macos.vst3
          path: build/NAMLoader.vst3
          retention-days: 30

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          choco install cmake eigen --version=3.4.0
      - name: Build Windows VST3
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..
          cmake --build . --config Release -j
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: NAMLoader-windows.vst3
          path: build/Release/NAMLoader.vst3
          retention-days: 30

  release:
    needs: [linux, macos, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/NAMLoader-linux.vst3/NAMLoader.vst3
            artifacts/NAMLoader-macos.vst3/NAMLoader.vst3
            artifacts/NAMLoader-windows.vst3/NAMLoader.vst3
          generate_release_notes: true