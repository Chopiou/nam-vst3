name: Build VST3 Plugin (macOS)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Fetch VST3 SDK (Steinberg)
        run: |
          git clone --depth 1 --recurse-submodules --branch v3.8.0_build_66 https://github.com/steinbergmedia/vst3sdk.git "${{ runner.temp }}/vst3sdk"
      - name: Install dependencies
        run: |
          brew install cmake eigen pkg-config
      - name: Build macOS VST3 (Universal)
        run: |
          rm -rf build && mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" -DVST3_SDK_PATH="${{ runner.temp }}/vst3sdk"
          cmake --build . --config Release -j$(sysctl -n hw.ncpu)
      - name: Ad-hoc codesign (no Apple ID required)
        run: |
          codesign --force --deep --sign - --timestamp=none build/NAMLoader.vst3
      - name: Package macOS universal tar.gz (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          tar -czf "Namloader-${TAG}.tar.gz" -C build NAMLoader.vst3
          echo "TAR_NAME=Namloader-${TAG}.tar.gz" >> $GITHUB_ENV
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: NAMLoader-macos.vst3
          path: build/NAMLoader.vst3
          retention-days: 30
      - name: Upload macOS tar.gz for release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Namloader-macos-universal
          path: "${{ env.TAR_NAME }}"
          retention-days: 30

  release:
    needs: [macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/Namloader-macos-universal/Namloader-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
      - name: Update Homebrew tap SHA256
        id: update_sha256
        if: success()
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TARBALL="Namloader-${TAG}.tar.gz"
          TARBALL_PATH=$(find artifacts -name "$TARBALL" | head -1)
          if [ -z "$TARBALL_PATH" ] || [ ! -f "$TARBALL_PATH" ]; then
            echo "Tarball not found: $TARBALL" >&2
            find artifacts -type f -name "*.tar.gz" 2>/dev/null
            exit 1
          fi
          SHA256=$(sha256sum "$TARBALL_PATH" | cut -d' ' -f1)
          echo "SHA256=$SHA256" >> $GITHUB_OUTPUT
          echo "Version: $TAG"
          echo "Tarball: $TARBALL"
          echo "SHA256: $SHA256"

      - name: Checkout Homebrew tap
        if: success()
        uses: actions/checkout@v4
        with:
          repository: Chopiou/homebrew-namloader
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-namloader

      - name: Update formula SHA256 and version
        if: success()
        working-directory: homebrew-namloader
        env:
          TAG: ${{ github.ref_name }}
          SHA256: ${{ steps.update_sha256.outputs.SHA256 }}
        run: |
          VERSION="${TAG#v}"
          # Match any version format (with or without v prefix, any numbers)
          sed -i -E 's/version "[^"]+"/version "'"${VERSION}"'"/' Formula/namloader.rb
          # Match any sha256 value
          sed -i -E 's/sha256 "[^"]+"/sha256 "'"${SHA256}"'"/' Formula/namloader.rb
          cat Formula/namloader.rb

      - name: Commit SHA256 to homebrew tap
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: Chopiou/homebrew-namloader
          branch: update-sha256-${{ github.ref_name }}
          base: main
          commit-message: "Update SHA256 for Namloader ${{ github.ref_name }}"
          title: "Update SHA256 for Namloader ${{ github.ref_name }}"
          body: |
            Auto-update SHA256 for [Namloader ${{ github.ref_name }}](https://github.com/Chopiou/nam-vst3/releases/tag/${{ github.ref_name }})
            
            - Tarball: `Namloader-v${{ github.ref_name }}.tar.gz`
            - SHA256: `${{ steps.update_sha256.outputs.SHA256 }}`
          path: homebrew-namloader